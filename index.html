<!doctype html>
<html lang="it">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        <title>Murales al Moncalvo</title>

        <link rel="stylesheet" href="dist/reset.css">
        <link rel="stylesheet" href="dist/reveal.css">
        <link rel="stylesheet" href="dist/theme/white.css">
        <link rel="icon" type="image/png" href="FAVICON.png"> 
        <style>
            .reveal-viewport {
                height: 100vh !important;
                max-height: 100vh !important;
            }

            .reveal .slides section { padding: 0; }
            
            /* Adattamento perfetto per schermi desktop e mobile */
            .reveal .slides img, .reveal .slides video {
                width: auto;
                height: 100vh;
                max-height: 100vh;
                object-fit: contain; 
                margin: 0 auto;
            }
            
            .video-container { width: 100%; height: 100vh; background: white; }

            /* Bilanciamento video */
            .reveal .slides video {
                height: 95vh !important;
                max-height: 95vh !important;
                margin-bottom: 5vh !important; 
                margin-right: 1vw;
            }
        </style>
    </head>
    <body>
        <div class="reveal">
            <div class="slides">

                <section><img src="Slide/Slide.jpg" alt="Pagina 1"></section>
                <section><img src="Slide/Slide2.jpg" alt="Pagina 2"></section>
                <section><img src="Slide/Slide3.jpg" alt="Pagina 3"></section>
                <section><img src="Slide/Slide4.jpg" alt="Pagina 4"></section>
                <section><img src="Slide/Slide5.jpg" alt="Pagina 5"></section>
                <section><img src="Slide/Slide6.jpg" alt="Pagina 6"></section>
                
                <section data-background-color="#BC5952"><img src="Slide/Slide7.jpg" alt="Pagina 7"></section>
                <section data-background-color="#BC5952"><img src="Slide/Slide8.jpg" alt="Pagina 8"></section>
                <section data-background-color="#BC5952"><img src="Slide/Slide9.jpg" alt="Pagina 9"></section>

                <section>
                    <div class="video-container">
                        <video data-autoplay loop muted playsinline>
                            <source src="Slide/Schema_composizione.mp4" type="video/mp4">
                        </video>
                    </div>
                </section>

                <section data-background-color="#BC5952"><img src="Slide/Slide10.jpg" alt="Pagina 10"></section>


                <section data-background-color="#BC5952"><img src="Slide/Slide11.jpg" alt="Pagina 11"></section>
                <section><img src="Slide/Render.jpg" alt="Pagina 13"></section>
                <section><img src="Slide/Render2.jpg" alt="Pagina 14"></section>
                <section><img src="Slide/Render3.jpg" alt="Pagina 15"></section>
                <section><img src="Slide/Render4.jpg" alt="Pagina 16"></section>
                <section><img src="Slide/Slide17.jpg" alt="Pagina 17"></section>

            </div>
        </div>

        <script src="dist/reveal.js"></script>
        <script>
            Reveal.initialize({
                hash: true,
                margin: 0,
                minScale: 0.1,
                maxScale: 1.0,
                disableLayout: true, 
                plugins: [ ],
                
                progress: false, 
                controls: false, 
                
                // CORRETTO: Stacco totalmente netto, zero sfarfallii sui colori
                transition: 'none', 
                backgroundTransition: 'none',
                navigationMode: 'linear',

                keyboard: {
                    39: 'next', 
                    32: 'next', 
                    40: 'next', 
                    37: 'prev', 
                    38: 'prev'  
                }
            });
        </script>
    </body>
</html>
