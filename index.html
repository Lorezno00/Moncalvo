<!doctype html>
<html lang="it">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

        <title>Murales al Moncalvo</title>

        <link rel="stylesheet" href="dist/reset.css">
        <link rel="stylesheet" href="dist/reveal.css">
        <link rel="stylesheet" href="dist/theme/white.css">
        <link rel="icon" type="image/png" href="FAVICON.png"> 
        <style>
            .reveal-viewport {
                height: 100vh !important;
                max-height: 100vh !important;
            }

            .reveal .slides section { padding: 0; }
            
            /* Adattamento perfetto per schermi desktop e mobile */
            .reveal .slides img, .reveal .slides video {
                width: auto;
                height: 100vh;
                max-height: 100vh;
                object-fit: contain; 
                margin: 0 auto;
            }
            
            .video-container { width: 100%; height: 100vh; background: white; }

            /* Bilanciamento video */
            .reveal .slides video {
                height: 95vh !important;
                max-height: 95vh !important;
                margin-bottom: 5vh !important; 
                margin-right: 1vw;
            }
        </style>
    </head>
    <body>
        <div class="reveal">
            <div class="slides">

                <section><img src="Slide/SLIDE_moncalvo.jpg" alt="Pagina 1"></section>
                <section><img src="Slide/SLIDE_moncalvo2.jpg" alt="Pagina 2"></section>
                <section><img src="Slide/SLIDE_moncalvo3.jpg" alt="Pagina 3"></section>
                <section><img src="Slide/SLIDE_moncalvo4.jpg" alt="Pagina 4"></section>
                <section><img src="Slide/SLIDE_moncalvo5.jpg" alt="Pagina 5"></section>
                <section><img src="Slide/SLIDE_moncalvo6.jpg" alt="Pagina 6"></section>
                
                <section data-background-color="#BC5952"><img src="Slide/SLIDE_moncalvo7.jpg" alt="Pagina 7"></section>
                <section data-background-color="#BC5952"><img src="Slide/SLIDE_moncalvo8.jpg" alt="Pagina 8"></section>
                <section data-background-color="#BC5952"><img src="Slide/SLIDE_moncalvo9.jpg" alt="Pagina 9"></section>

                <section data-background-video="Slide/Schema_composizione.mp4" data-background-video-loop data-background-video-muted>
                </section>

                <section data-background-color="#BC5952"><img src="Slide/SLIDE_moncalvo11.jpg" alt="Pagina 11"></section>
                <section data-background-color="#BC5952"><img src="Slide/SLIDE_moncalvo10.jpg" alt="Pagina 10"></section>


                <section><img src="Slide/SLIDE_moncalvo13.jpg" alt="Pagina 14"></section>
                <section><img src="Slide/SLIDE_moncalvo14.jpg" alt="Pagina 15"></section>
                <section><img src="Slide/SLIDE_moncalvo16.jpg" alt="Pagina 16"></section>
                <section><img src="Slide/SLIDE_moncalvo17.jpg" alt="Pagina 17"></section>

            </div>
        </div>

        <script src="dist/reveal.js"></script>
        <script>
            Reveal.initialize({
    hash: true,
    margin: 0,
    minScale: 0.1,
    maxScale: 1.0,
    disableLayout: true, 
    plugins: [ ],
    
    progress: false, 
    controls: false, 
    transition: 'none', 
    backgroundTransition: 'none',
    navigationMode: 'linear',

    // FORZA L'AUTOPLAY DEI MEDIA SU MOBILE ANCHE SENZA INTERAZIONE
    autoPlayMedia: true, 

    keyboard: {
        39: 'next', 
        32: 'next', 
        40: 'next', 
        37: 'prev', 
        38: 'prev'  
    }
});
        </script>
    </body>
</html>
